server:
  port: 8080
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
spring:
  config:
    activate:
      on-profile: local
  application:
    name: api-gateway
  cloud:
    gateway:
      #apigateway는 엔진으로 톰캣(동기프레임워크)이 아니라 netty(비동기프레임워크)기반의 스프링부트다.
      #모든 진입점 가장 좋은 성능의 컴퓨터
      #      CORS 처리. 서비스모듈에서는 웹브라우저와 직접 통신하지 않으므로, cors처리 불필요.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - 'http://localhost:3000'
              - 'https://www.realview45.shop'
            allowedMethods: '*'
            allowedHeaders: '*'
            allowedCredentials: true
      routes:
        - id: member-service
          predicates:
            #localhost:8080/member-service/member/create구리
            - Path=/member-service/**
          filters:
            # StripPrefix : 첫번째 접두어를 제거후에 member-service로 http요청 전달
            - StripPrefix=1
            # eureka에 등록된 member-service라는 이름으로 http요청 라우팅(전달)
          uri: lb://member-service
        - id: ordering-service
          predicates:
            - Path=/ordering-service/**
          filters:
            - StripPrefix=1
          uri: lb://ordering-service
        - id: product-service
          predicates:
            - Path=/product-service/**
          filters:
            - StripPrefix=1
          uri: lb://product-service
