server :
  port : 8080

eureka:
  client:
    enabled: false

product:
  service:
    url: "http://product-service/"

spring:
  config:
    activate:
      on-profile: prod
  application:
    name : ordering-service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/ordermsa?useSSL=true
    username: admin
    password: ${DB_PW}
hikari:
  maximum-pool-size: 1
jpa:
  database: mysql
  database-platform: org.hibernate.dialect.MariaDBDialect
  generate-ddl: true
  hibernate:
    ddl-auto : create
  show_sql: true
redis:
  host: redis-service
  port: 6379
kafka:
  kafka-server: kafka-service:9092