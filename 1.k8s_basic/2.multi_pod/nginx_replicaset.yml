apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  namespace: jk-ns
spec:
  replicas: 2
  selector:
    matchLabels:
    # 이 pod는 replicaset에서 만들어졌어구리
    # 아래의 label은 replicaset이 관리해야 할 파드를 결정하는 데 사용
      app: my-nginx
  template:
  # 아래의 label은 service에서 라우팅할 대상이 되는 label. service의 selector.app과 일치해야 함
    metadata:
      labels:
      # 서비스에서 라벨찾을 때 사용하는 앱 service : selector:app구리
        app: my-nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
# 클러스터내에서 service명은 url주소(엔드포인트)로 사용. ex)http://my-service:포트번호
  name: my-service
  namespace: jk-ns
spec:
  type: ClusterIP
  ports:
  # port는 서비스의 port. targetPort는 pod내 컨테이너의 port(내부포트).
  - port: 80
    targetPort: 80 
    # selector.app은 pod의 label과 일치되어야 매핑이 됨.
  selector:
    app: my-nginx #label명