apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  # 없으면 default ns에 생성
  namespace: jk-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest #1.21.6 #1.22.1 latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
# 클러스터내에서 service명은 url주소(엔드포인트)로 사용. ex)http://my-service:포트번호
  name: my-service
  namespace: jk-ns
spec:
  type: ClusterIP
  ports:
  # port는 서비스의 port. targetPort는 pod내 컨테이너의 port(내부포트).
  - port: 80
    targetPort: 80 
    # selector.app은 pod의 label과 일치되어야 매핑이 됨.
  selector:
    app: my-nginx #label명